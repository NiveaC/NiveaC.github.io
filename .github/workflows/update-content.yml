name: 更新 Notion 內容

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Commit 備註（選填）'
        required: false
        default: 'chore: sync content from Notion'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 從 Notion 同步資料
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: node scripts/fetch-notion.js

      - name: 提交變更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cases.json
          git diff --staged --quiet || git commit -m "${{ github.event.inputs.message }}"

      - name: 推送到 main
        run: git push
